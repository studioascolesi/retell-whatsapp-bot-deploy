<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Ascolesi — Stato Sistema</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #050506;
            --bg: #0a0a0c;
            --surface: rgba(255,255,255,0.025);
            --border: rgba(255,255,255,0.05);
            --border-subtle: rgba(255,255,255,0.03);
            --gold: #c9a96e;
            --gold-light: #dfc08a;
            --gold-dim: rgba(201,169,110,0.12);
            --gold-glow: rgba(201,169,110,0.06);
            --green: #4ade80;
            --green-dim: rgba(74,222,128,0.12);
            --red: #f87171;
            --red-dim: rgba(248,113,113,0.12);
            --text: #e8e4dc;
            --text-secondary: #7a756c;
            --text-tertiary: #4a4640;
            --serif: 'Cormorant Garamond', 'Georgia', serif;
            --sans: 'DM Sans', -apple-system, sans-serif;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        body {
            font-family: var(--sans);
            background: var(--bg-deep);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 30% 70%, rgba(201,169,110,0.03) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 70% 30%, rgba(201,169,110,0.02) 0%, transparent 50%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.25;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 48px 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.02),
                0 24px 80px rgba(0,0,0,0.5),
                0 0 120px var(--gold-glow);
            opacity: 0;
            transform: translateY(20px) scale(0.98);
            animation: card-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }

        @keyframes card-in {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .eyebrow {
            font-family: var(--sans);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .eyebrow::before {
            content: '';
            width: 0;
            height: 1px;
            background: var(--gold);
            opacity: 0.5;
            animation: line-grow 0.6s ease-out 0.6s forwards;
        }

        @keyframes line-grow { to { width: 20px; } }

        h1 {
            font-family: var(--serif);
            font-size: 32px;
            font-weight: 300;
            line-height: 1.15;
            margin-bottom: 32px;
        }

        h1 em {
            font-style: italic;
            font-weight: 400;
            color: var(--gold-light);
        }

        .services {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }

        .service-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: rgba(255,255,255,0.015);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateX(-8px);
        }

        .service-row:nth-child(1) { animation: row-in 0.5s ease-out 0.5s forwards; }
        .service-row:nth-child(2) { animation: row-in 0.5s ease-out 0.65s forwards; }
        .service-row:nth-child(3) { animation: row-in 0.5s ease-out 0.8s forwards; }

        @keyframes row-in {
            to { opacity: 1; transform: translateX(0); }
        }

        .service-row:hover {
            background: rgba(255,255,255,0.03);
            border-color: rgba(255,255,255,0.06);
        }

        .service-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .service-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .service-row:hover .service-dot {
            transform: scale(1.3);
        }

        .service-dot.ok {
            background: var(--green);
            box-shadow: 0 0 12px rgba(74,222,128,0.4);
            animation: pulse-green 2.5s ease-in-out infinite;
        }

        .service-dot.err {
            background: var(--red);
            box-shadow: 0 0 12px rgba(248,113,113,0.4);
            animation: pulse-red 2s ease-in-out infinite;
        }

        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 12px rgba(74,222,128,0.4); }
            50% { box-shadow: 0 0 20px rgba(74,222,128,0.6); }
        }

        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 12px rgba(248,113,113,0.4); }
            50% { box-shadow: 0 0 20px rgba(248,113,113,0.6); }
        }

        .service-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
        }

        .service-status {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.04em;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .service-status.ok {
            background: var(--green-dim);
            color: var(--green);
        }

        .service-status.err {
            background: var(--red-dim);
            color: var(--red);
        }

        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin-bottom: 24px;
        }

        .meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .meta-label {
            color: var(--text-tertiary);
            letter-spacing: 0.03em;
        }

        .meta-value {
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
        }

        .footer-link {
            margin-top: 28px;
            text-align: center;
            opacity: 0;
            animation: row-in 0.5s ease-out 1s forwards;
        }

        .footer-link a {
            font-size: 11px;
            color: var(--text-tertiary);
            text-decoration: none;
            letter-spacing: 0.06em;
            transition: color 0.3s ease;
        }

        .footer-link a:hover {
            color: var(--gold);
        }

        @media (max-width: 480px) {
            .card { margin: 20px; padding: 36px 28px; }
            h1 { font-size: 26px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="eyebrow">Stato Sistema</div>
        <h1>Il sistema è <em>operativo.</em></h1>

        <div class="services">
            <div class="service-row">
                <div class="service-left">
                    <div class="service-dot" id="dot-server"></div>
                    <div class="service-name">Server</div>
                </div>
                <div class="service-status" id="status-server">—</div>
            </div>
            <div class="service-row">
                <div class="service-left">
                    <div class="service-dot" id="dot-whatsapp"></div>
                    <div class="service-name">WhatsApp</div>
                </div>
                <div class="service-status" id="status-whatsapp">—</div>
            </div>
            <div class="service-row">
                <div class="service-left">
                    <div class="service-dot" id="dot-retell"></div>
                    <div class="service-name">Webhook</div>
                </div>
                <div class="service-status" id="status-retell">—</div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="meta">
            <div class="meta-row">
                <span class="meta-label">Ultimo aggiornamento</span>
                <span class="meta-value" id="meta-time">—</span>
            </div>
            <div class="meta-row">
                <span class="meta-label">Servizio</span>
                <span class="meta-value">Studio Ascolesi</span>
            </div>
            <div class="meta-row">
                <span class="meta-label">Ambiente</span>
                <span class="meta-value">Production</span>
            </div>
        </div>

        <div class="footer-link">
            <a href="/clienti">Gestione Clienti →</a><br><br>
            <a href="/setup">← Torna al setup</a>
        </div>
    </div>

    <script>
        function setService(id, ok) {
            const dot = document.getElementById(`dot-${id}`);
            const status = document.getElementById(`status-${id}`);
            if (ok) {
                dot.className = 'service-dot ok';
                status.className = 'service-status ok';
                status.textContent = 'Attivo';
            } else {
                dot.className = 'service-dot err';
                status.className = 'service-status err';
                status.textContent = 'Offline';
            }
        }

        async function refresh() {
            try {
                const res = await fetch('/health');
                const data = await res.json();
                setService('server', data.status === 'running');
            } catch {
                setService('server', false);
            }

            try {
                const res = await fetch('/status');
                const data = await res.json();
                setService('whatsapp', data.whatsapp.connected);
            } catch {
                setService('whatsapp', false);
            }

            // Webhook: se il server risponde, è configurato
            setService('retell', true);

            document.getElementById('meta-time').textContent =
                new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        refresh();
        setInterval(refresh, 5000);
    </script>
</body>
</html>
